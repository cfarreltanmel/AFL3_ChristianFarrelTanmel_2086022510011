        <div class="container">
            <a class="navbar-brand fw-bold" href="Index.html">UC People</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="Index.html">Home</a></li>

                </ul>

    <main class="container">
        <div class="row justify-content-center">+
            <div class="col-md-8 col-lg-6">
                <h2 class="text-center mb-4 display-5">Send a Message</h2>
                <div id="alertPlaceholder"></div>
                <div class="card shadow-sm border-0 p-4">
                    <div class="card-body">
                        <form id="contactForm">
                            <div class="mb-3">
                                <label for="inputName" class="form-label text-muted">Nama Lengkap</label>
                                <input type="text" class="form-control" id="inputName" placeholder="Christian Farrel Tanmel">
                            </div>
                            <div class="mb-3">
                                <label for="inputEmail" class="form-label text-muted">Alamat Email</label>
                                <input type="email" class="form-control" id="inputEmail" placeholder="cfarreltanmel@student.ciputra.ac.id">
                            </div>
                            <div class="mb-4">
                                <label for="inputMessage" class="form-label text-muted">Pesan</label>
                                <textarea class="form-control" id="inputMessage" rows="5" placeholder="Tuliskan pesan Anda di sini..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Kirim Pesan</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-dark text-white text-center py-4 mt-auto">
